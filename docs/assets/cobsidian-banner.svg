<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="360" viewBox="0 0 1200 360">
  <title>Cobsidian banner</title>
  <desc>A minimal light banner for Cobsidian: maintain a linked Obsidian vault with your coding agent.</desc>
  <style>
    .display {
      font-family: "Helvetica Neue", Helvetica, "Aptos Display", "Segoe UI Variable Display", sans-serif;
      font-weight: 650;
      letter-spacing: -0.035em;
    }
    .body {
      font-family: "Aptos", "Segoe UI Variable", "Segoe UI", sans-serif;
    }
    .signature-edge {
      fill: none;
      stroke: #8f85f6;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>

  <rect width="1200" height="360" rx="16" fill="#eef0f5"/>
  <path d="M812 0 H1184 Q1200 0 1200 16 V344 Q1200 360 1184 360 H748 Z" fill="#eceafd"/>

  <g transform="translate(74 78)">
    <g class="linked-note-mark" aria-label="Cobsidian linked-note mark">
      <rect width="44" height="56" rx="7" fill="none" stroke="#6254f3" stroke-width="2.4"/>
      <rect x="18" y="12" width="44" height="56" rx="7" fill="none" stroke="#1d1e27" stroke-width="2.4"/>
      <path d="M13 37 H48" fill="none" stroke="#6254f3" stroke-width="2.4" stroke-dasharray="4 4"/>
    </g>

    <text x="0" y="143" class="display" fill="#1d1e27" font-size="90">Cobsidian</text>
    <text x="3" y="190" class="body" fill="#424655" font-size="23">Maintain a linked Obsidian vault with your coding agent.</text>
  </g>

  <g transform="translate(840 62)" aria-label="One note growing into useful connections">
    <path d="M91 117 C139 117 143 72 194 72" class="signature-edge"/>
    <path d="M91 117 C139 117 145 117 221 117" class="signature-edge"/>
    <path d="M91 117 C139 117 143 163 194 163" class="signature-edge"/>

    <g transform="translate(12 72)">
      <rect width="78" height="98" rx="12" fill="#ffffff" stroke="#6254f3" stroke-width="2.5"/>
      <rect x="16" y="14" width="78" height="98" rx="12" fill="#f9f9fd" stroke="#1d1e27" stroke-width="2.5"/>
      <path d="M31 47 H79 M31 64 H70 M31 81 H60" fill="none" stroke="#8a8e9b" stroke-width="2" stroke-linecap="round"/>
      <circle cx="79" cy="97" r="7" fill="#6254f3"/>
    </g>

    <circle cx="204" cy="72" r="13" fill="#28a6bb"/>
    <circle cx="231" cy="117" r="13" fill="#e8a43b"/>
    <circle cx="204" cy="163" r="13" fill="#32b783"/>
  </g>
</svg>
