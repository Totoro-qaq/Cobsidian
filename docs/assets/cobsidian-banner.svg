<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="360" viewBox="0 0 1200 360">
  <title>Cobsidian banner</title>
  <desc>Light glassmorphism banner for Cobsidian. Turn AI conversations into linked Obsidian knowledge, safely.</desc>
  <defs>
    <linearGradient id="neutral-surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbfaf7"/>
      <stop offset="48%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#ece8f7"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.86"/>
      <stop offset="54%" stop-color="#f7f7ff" stop-opacity="0.68"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="58%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="orbA" cx="24%" cy="20%" r="46%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="84%" cy="20%" r="44%">
      <stop offset="0%" stop-color="#99f6e4" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#99f6e4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#334155" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-35%" y="-60%" width="170%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#475569" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <style>
      .title {
        fill: #1f2937;
        font-family: "Aptos Display", "SF Pro Display", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", sans-serif;
        font-size: 88px;
        font-weight: 850;
        letter-spacing: 1px;
      }
      .subtitle {
        fill: #334155;
        font-family: "Aptos", "SF Pro", "Segoe UI Variable", "Segoe UI", "Helvetica Neue", sans-serif;
        font-size: 20px;
        font-weight: 500;
      }
      .chip-text {
        fill: #1f2937;
        font-family: "Aptos", "SF Pro", "Segoe UI Variable", "Segoe UI", "Helvetica Neue", sans-serif;
        font-size: 17px;
        font-weight: 700;
      }
      .micro {
        fill: #475569;
        font-family: Cascadia Code, JetBrains Mono, SFMono-Regular, Consolas, monospace;
        font-size: 14px;
        opacity: 0.88;
      }
      .glass-panel {
        fill: url(#glass);
        stroke: #ffffff;
        stroke-opacity: 0.78;
        stroke-width: 1.2;
      }
      .circuit-line {
        fill: none;
        stroke: #7c3aed;
        stroke-linecap: round;
        stroke-opacity: 0.24;
        stroke-width: 2;
      }
      .node {
        fill: #7c3aed;
        opacity: 0.50;
        filter: url(#glow);
      }
      .linked-note-mark {
        filter: url(#glow);
      }
    </style>
  </defs>
  <rect width="1200" height="360" rx="34" fill="url(#neutral-surface)"/>
  <rect width="1200" height="360" rx="34" fill="url(#orbA)"/>
  <rect width="1200" height="360" rx="34" fill="url(#orbB)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)" opacity="0.95"/>
  <path d="M100 38 C240 18 400 42 560 24 S760 14 920 34 1100 20" class="circuit-line"/>
  <path d="M770 316 C850 302 930 306 990 322 S1080 334 1140 310" class="circuit-line"/>
  <circle cx="100" cy="38" r="5" class="node"/>
  <circle cx="560" cy="24" r="5" class="node"/>
  <circle cx="920" cy="34" r="5" class="node"/>
  <circle cx="1100" cy="20" r="5" class="node"/>
  <circle cx="990" cy="322" r="5" class="node"/>
  <circle cx="1140" cy="310" r="5" class="node"/>
  <g filter="url(#soft-shadow)">
    <rect x="78" y="58" width="1044" height="244" rx="28" class="glass-panel"/>
    <rect x="100" y="82" width="1000" height="196" rx="22" fill="#ffffff" fill-opacity="0.52" stroke="#cbd5e1" stroke-opacity="0.58"/>
  </g>
  <g transform="translate(132 115)">
    <rect x="0" y="-26" width="154" height="34" rx="17" fill="#ffffff" fill-opacity="0.58" stroke="#c4b5fd" stroke-opacity="0.56"/>
    <text x="77" y="-9" class="micro" text-anchor="middle" dominant-baseline="middle">LOCAL FIRST</text>
    <text x="0" y="80" class="title">Cobsidian</text>
    <text x="4" y="120" class="subtitle">Turn AI conversations into linked Obsidian knowledge, safely.</text>
  </g>
  <g transform="translate(790 92)">
    <rect x="0" y="0" width="286" height="142" rx="22" fill="#ffffff" fill-opacity="0.62" stroke="#cbd5e1" stroke-opacity="0.78"/>
    <g class="linked-note-mark" transform="translate(16 10)">
      <path d="M68 24 C106 22 130 14 168 14" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M35 40 C40 50 74 54 96 58" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M207 32 C207 46 164 54 148 58" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <rect x="2" y="8" width="66" height="32" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
      <text x="35" y="28" class="micro" text-anchor="middle">RAG</text>
      <rect x="166" y="0" width="82" height="32" rx="10" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
      <text x="207" y="20" class="micro" text-anchor="middle">Agents</text>
      <rect x="66" y="56" width="110" height="32" rx="10" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="121" y="76" class="micro" text-anchor="middle">Vector DB</text>
    </g>
    <text x="143" y="126" class="micro" text-anchor="middle">7 modes · auto-link · dry-run</text>
  </g>
  <g transform="translate(132 246)">
    <rect x="0" y="0" width="132" height="38" rx="19" fill="#ffffff" fill-opacity="0.66" stroke="#c4b5fd" stroke-opacity="0.66"/>
    <text x="66" y="19" class="chip-text" text-anchor="middle" dominant-baseline="middle">dry-run first</text>
    <rect x="154" y="0" width="116" height="38" rx="19" fill="#ffffff" fill-opacity="0.66" stroke="#a78bfa" stroke-opacity="0.60"/>
    <text x="212" y="19" class="chip-text" text-anchor="middle" dominant-baseline="middle">wiki links</text>
    <rect x="292" y="0" width="124" height="38" rx="19" fill="#ffffff" fill-opacity="0.66" stroke="#99f6e4" stroke-opacity="0.60"/>
    <text x="354" y="19" class="chip-text" text-anchor="middle" dominant-baseline="middle">MCP ready</text>
  </g>
</svg>
