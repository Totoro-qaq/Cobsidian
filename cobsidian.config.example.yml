# Cobsidian v0.5 supported config.
# Copy to cobsidian.config.yml and adjust for your vault.
# Every field below is consumed by the helper scripts or MCP server.

vault:
  # Absolute path is safest. Relative paths are resolved from the current working directory.
  path: "/path/to/obsidian-vault"

defaults:
  # null means the agent should infer or ask for the mode.
  mode: null

interaction:
  # auto expands complex or inferred work; always expands; off only hides presentation.
  knowledge_read: auto

notes:
  directories:
    learning: "Learning"
    project: "Projects"
    review: "Reviews"
    comparison: "Comparisons"
    index: "Index"
    capture: "Daily"
    dissection: "Dissections"

linking:
  max_suggested_backlinks: 8

duplicates:
  prefer_append_over_duplicate: true
  similar_title_threshold: 0.88

validation:
  run_after_write: true
  strict: false
